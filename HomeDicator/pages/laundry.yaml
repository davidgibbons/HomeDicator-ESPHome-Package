# Laundry page
#
# Substitutions required in root config:
#   laundry_washer_status_entity  - HA entity showing washer state
#   laundry_dryer_status_entity   - HA entity showing dryer state
#   laundry_cancel_entity         - HA script/button to call on Cancel
#   laundry_submit_entity         - HA script to call on Start
#                                   (must accept variables: person, device)

globals:
  - id: laundry_person
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: laundry_device
    type: std::string
    restore_value: no
    initial_value: '""'

text_sensor:
  - platform: homeassistant
    id: laundry_washer_status
    entity_id: ${laundry_washer_status_entity}
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_washer_status
          text: !lambda return x;

  - platform: homeassistant
    id: laundry_dryer_status
    entity_id: ${laundry_dryer_status_entity}
    internal: true
    on_value:
      - lvgl.label.update:
          id: lbl_dryer_status
          text: !lambda return x;

lvgl:
  pages:
    - id: laundry_page
      bg_opa: TRANSP
      widgets:
        - !include
            file: ../app/templates/page_title.yaml
            vars:
              title: "Laundry"

        - obj:
            styles: content_container
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: START
              pad_row: 12

            widgets:

              # ── Row 1: Status tiles (full size) ───────────────────────────
              - obj:
                  bg_opa: TRANSP
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  pad_all: 0
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    pad_column: 9
                  widgets:

                    - obj:
                        styles: info_or_button_tile
                        bg_color: 0x1a3a5c
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              text: "\U000F07DB"  # mdi:washing-machine
                              styles: info_or_button_tile_icon
                              text_color: 0xffffff
                              clickable: false
                          - label:
                              id: lbl_washer_status
                              text: "n/a"
                              text_color: 0xffffff
                              text_font: libreFranklin18
                              clickable: false
                          - label:
                              text: "Washer"
                              styles: info_or_button_tile_subtitle
                              clickable: false

                    - obj:
                        styles: info_or_button_tile
                        bg_color: 0x1a3a5c
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          pad_row: 4
                        widgets:
                          - label:
                              text: "\U000F116C"  # mdi:tumble-dryer
                              styles: info_or_button_tile_icon
                              text_color: 0xffffff
                              clickable: false
                          - label:
                              id: lbl_dryer_status
                              text: "n/a"
                              text_color: 0xffffff
                              text_font: libreFranklin18
                              clickable: false
                          - label:
                              text: "Dryer"
                              styles: info_or_button_tile_subtitle
                              clickable: false

              # ── Rows 2-3: 3-column selector grid ──────────────────────────
              # Col 1: Device (Washer / Kati)
              # Col 2: Person (Dryer / Jess)   [note: D top, J bottom per sketch]
              # Col 3: Actions (Submit / Cancel)
              - obj:
                  bg_opa: TRANSP
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  pad_all: 0
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: START
                    flex_align_cross: START
                    pad_column: 9
                  widgets:

                    # Column 1 — Device selectors
                    - obj:
                        bg_opa: TRANSP
                        width: 148
                        height: SIZE_CONTENT
                        pad_all: 0
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 9
                        widgets:
                          - button:
                              id: btn_device_washer
                              checkable: true
                              width: 148
                              height: 78
                              bg_color: 0x333333
                              border_width: 0
                              shadow_width: 0
                              radius: 10
                              checked:
                                bg_color: 0x1a5276
                              on_click:
                                then:
                                  - lvgl.widget.update:
                                      id: btn_device_dryer
                                      state:
                                        checked: false
                                  - lambda: id(laundry_device) = "washer";
                              widgets:
                                - label:
                                    text: "Washer"
                                    text_color: 0xffffff
                                    text_font: libreFranklin18
                                    clickable: false
                          - button:
                              id: btn_person_kati
                              checkable: true
                              width: 148
                              height: 78
                              bg_color: 0x333333
                              border_width: 0
                              shadow_width: 0
                              radius: 10
                              checked:
                                bg_color: 0x4a235a
                              on_click:
                                then:
                                  - lvgl.widget.update:
                                      id: btn_person_jess
                                      state:
                                        checked: false
                                  - lambda: id(laundry_person) = "kati";
                              widgets:
                                - label:
                                    text: "Kati"
                                    text_color: 0xffffff
                                    text_font: libreFranklin18
                                    clickable: false

                    # Column 2 — Person selectors
                    - obj:
                        bg_opa: TRANSP
                        width: 148
                        height: SIZE_CONTENT
                        pad_all: 0
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 9
                        widgets:
                          - button:
                              id: btn_device_dryer
                              checkable: true
                              width: 148
                              height: 78
                              bg_color: 0x333333
                              border_width: 0
                              shadow_width: 0
                              radius: 10
                              checked:
                                bg_color: 0x1a5276
                              on_click:
                                then:
                                  - lvgl.widget.update:
                                      id: btn_device_washer
                                      state:
                                        checked: false
                                  - lambda: id(laundry_device) = "dryer";
                              widgets:
                                - label:
                                    text: "Dryer"
                                    text_color: 0xffffff
                                    text_font: libreFranklin18
                                    clickable: false
                          - button:
                              id: btn_person_jess
                              checkable: true
                              width: 148
                              height: 78
                              bg_color: 0x333333
                              border_width: 0
                              shadow_width: 0
                              radius: 10
                              checked:
                                bg_color: 0x4a235a
                              on_click:
                                then:
                                  - lvgl.widget.update:
                                      id: btn_person_kati
                                      state:
                                        checked: false
                                  - lambda: id(laundry_person) = "jess";
                              widgets:
                                - label:
                                    text: "Jess"
                                    text_color: 0xffffff
                                    text_font: libreFranklin18
                                    clickable: false

                    # Column 3 — Actions
                    - obj:
                        bg_opa: TRANSP
                        width: 148
                        height: SIZE_CONTENT
                        pad_all: 0
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          pad_row: 9
                        widgets:
                          - button:
                              width: 148
                              height: 78
                              bg_color: 0x1a6b2a
                              border_width: 0
                              shadow_width: 0
                              radius: 10
                              on_click:
                                then:
                                  - homeassistant.action:
                                      action: script.turn_on
                                      data:
                                        entity_id: ${laundry_submit_entity}
                                        variables:
                                          person: !lambda return id(laundry_person);
                                          device: !lambda return id(laundry_device);
                                  - lvgl.widget.update:
                                      id: btn_device_washer
                                      state:
                                        checked: false
                                  - lvgl.widget.update:
                                      id: btn_device_dryer
                                      state:
                                        checked: false
                                  - lvgl.widget.update:
                                      id: btn_person_kati
                                      state:
                                        checked: false
                                  - lvgl.widget.update:
                                      id: btn_person_jess
                                      state:
                                        checked: false
                                  - lambda: |-
                                      id(laundry_person) = "";
                                      id(laundry_device) = "";
                              widgets:
                                - label:
                                    text: "Start"
                                    text_color: 0xffffff
                                    text_font: libreFranklin18
                                    clickable: false
                          - button:
                              width: 148
                              height: 78
                              bg_color: 0x7b1c1c
                              border_width: 0
                              shadow_width: 0
                              radius: 10
                              on_click:
                                then:
                                  - homeassistant.action:
                                      action: script.turn_on
                                      data:
                                        entity_id: ${laundry_cancel_entity}
                              widgets:
                                - label:
                                    text: "Cancel"
                                    text_color: 0xffffff
                                    text_font: libreFranklin18
                                    clickable: false
